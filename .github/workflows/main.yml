name: CI Pipeline

on:
    push:
        branches: [ "main" ]

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
        - name: Checkout code
          uses: actions/checkout@v3

        - name: Install dependencies
          run: pip install -r service_desk_app/requirements.txt

        - name: CI confirmation step
          run: echo "Pipeline executed successfully"
